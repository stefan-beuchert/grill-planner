services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Local dev always talks to the `db` service below, never Supabase.
      # Supabase connection strings only matter for the Vercel deployment
      # (see .env.example) and are set there as project env vars.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orbit
      DIRECT_URL: postgresql://postgres:postgres@db:5432/orbit
      # Separate database so `npm run test` never touches real dev data.
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/orbit_test
      # Dev-only default. Production sets its own value as a Vercel env var.
      ADMIN_PASSCODE: "1234"
      # Real credential — pulled from a local, gitignored .env file (Docker
      # Compose auto-loads .env for ${...} substitution). Production sets
      # its own value as a Vercel env var, same as ADMIN_PASSCODE.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - .:/app
      # Named (not anonymous) so they survive `docker compose down && up` —
      # anonymous volumes get a fresh empty one on every recreate, which
      # wipes the Turbopack build cache and forces node_modules to be
      # re-copied from the image every time. Named volumes are looked up by
      # name and reused, same as db_data below already was.
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - prisma_generated:/app/lib/generated
      # Playwright's browser binaries (~300MB) live here instead of in the
      # image, so the main dev image stays lean. The OS-level shared
      # libraries Chromium needs (glib, nss, X11, pango, cairo, xvfb,
      # fonts, ...) are baked into the image itself via the Dockerfile's
      # `playwright install-deps` step, so the one-time setup here is just
      # the binary download: `docker compose exec app npx playwright
      # install chromium`. Persists across rebuilds/restarts same as
      # node_modules above.
      - playwright_cache:/root/.cache/ms-playwright
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbit
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  node_modules:
  next_cache:
  prisma_generated:
  playwright_cache:
