services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Local dev always talks to the `db` service below, never Supabase.
      # Supabase connection strings only matter for the Vercel deployment
      # (see .env.example) and are set there as project env vars.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/grillplanner
      DIRECT_URL: postgresql://postgres:postgres@db:5432/grillplanner
      # Dev-only default. Production sets its own value as a Vercel env var.
      ADMIN_PASSCODE: "1234"
      # Real credential — pulled from a local, gitignored .env file (Docker
      # Compose auto-loads .env for ${...} substitution). Production sets
      # its own value as a Vercel env var, same as ADMIN_PASSCODE.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/lib/generated
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grillplanner
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  db_data:
